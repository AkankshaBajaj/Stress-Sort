<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #fff;
  height: 100vh; width: 100vw;
  overflow: hidden;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════
   ZONE 1 — HUD BAR
══════════════════════════════ */
#hud {
  background: #fff;
  border-bottom: 2px solid #e9d5ff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  flex-shrink: 0;
  z-index: 20;
}
.hud-pill {
  background: #f3f0ff; border: 2px solid #c4b5fd;
  border-radius: 50px; padding: 4px 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.85rem; color: #7c3aed;
}
#lives { display: flex; gap: 5px; align-items: center; }
.life { font-size: 1.2rem; transition: opacity 0.3s, transform 0.3s; }
.life.lost { opacity: 0.18; transform: scale(0.75); }

/* ══════════════════════════════
   ZONE 2 — CLOUD (centred, top)
══════════════════════════════ */
#cloud-zone {
  background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 16px 10px;
  flex-shrink: 0;
  position: relative;
  min-height: 170px;
}
#sun {
  position: absolute; top: 10px; right: 40px;
  width: 42px; height: 42px;
  background: radial-gradient(circle, #fef08a 0%, #fde047 70%, transparent 100%);
  border-radius: 50%;
  box-shadow: 0 0 24px 8px rgba(253,224,71,0.3);
  animation: sunPulse 3s ease-in-out infinite;
}
#instruction {
  font-family: 'Fredoka One', cursive;
  font-size: 0.72rem; color: #6d28d9;
  margin-bottom: 8px; letter-spacing: 0.5px;
}

/* cloud itself */
#cloud-container {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
#cloud-svg-wrap {
  position: relative;
}
#cloud-svg-wrap.pop   { animation: cloudPop 0.45s ease forwards; }
#cloud-svg-wrap.shake { animation: cloudShake 0.5s ease; }

/* ══════════════════════════════
   ZONE 3 — BUTTONS (middle)
══════════════════════════════ */
#buttons-zone {
  background: #fff;
  border-top: 2px solid #e9d5ff;
  border-bottom: 2px solid #e9d5ff;
  padding: 10px 12px;
  flex-shrink: 0;
}
#buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 500px;
  margin: 0 auto;
}
.cat-btn {
  background: #fff; border: 2.5px solid #c4b5fd;
  border-radius: 12px; padding: 8px 6px 6px;
  text-align: center; cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 2px 8px rgba(109,40,217,0.07);
  opacity: 0.4; pointer-events: none;
}
.cat-btn.lit {
  opacity: 1; border-color: #7c3aed; background: #faf5ff;
  box-shadow: 0 4px 14px rgba(109,40,217,0.2);
  pointer-events: auto;
  animation: btnPulse 1.4s ease-in-out infinite;
}
.cat-btn.lit:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 6px 20px rgba(109,40,217,0.3);
  animation: none;
}
.cat-btn.flash-correct { border-color:#16a34a !important; background:#f0fdf4 !important; animation:btnPop 0.5s ease !important; opacity:1; }
.cat-btn.flash-wrong   { border-color:#dc2626 !important; background:#fff1f2 !important; animation:btnShake 0.45s ease !important; opacity:1; }
.cat-btn-title { font-family:'Fredoka One',cursive; font-size:0.72rem; color:#4c1d95; line-height:1.2; }
.cat-btn-count { font-size:0.6rem; color:#a78bfa; font-weight:800; margin-top:2px; }

/* ══════════════════════════════
   ZONE 4 — CHARACTER (bottom)
══════════════════════════════ */
#char-zone {
  background: #fff;
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 8px;
  position: relative;
  min-height: 0;
  overflow: hidden;
}
#char-area {
  display: flex; flex-direction: column; align-items: center;
  animation: charBounce 1.6s ease-in-out infinite;
  position: relative;
}
#char-img {
  display: block; filter: none;
  transition: width 0.55s cubic-bezier(.34,1.56,.64,1),
              height 0.55s cubic-bezier(.34,1.56,.64,1);
}
#hearts-area {
  position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  pointer-events: none; z-index: 5;
}
.fheart {
  position: absolute; font-size: 1.3rem; left: 50%; top: 0;
  animation: floatheart 1.3s ease-out forwards;
}
#speech {
  position: absolute; bottom: 108%;
  left: 50%; transform: translateX(-50%);
  background: white; border: 2.5px solid #c4b5fd;
  border-radius: 14px; padding: 7px 13px;
  font-family: 'Fredoka One', cursive; font-size: 0.75rem; color: #4c1d95;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(109,40,217,0.15);
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10;
}
#speech::after  { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:7px solid transparent; border-top-color:#c4b5fd; }
#speech::before { content:''; position:absolute; top:calc(100% - 2px); left:50%; transform:translateX(-50%); border:7px solid transparent; border-top-color:white; z-index:1; }
#speech.show { opacity: 1; }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
#toast {
  position: fixed; top: 56px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: #fff; border-radius: 12px; padding: 8px 18px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.11);
  border: 2px solid #e5e7eb; border-left: 5px solid #7c3aed;
  font-size: 0.82rem; font-weight: 800; color: #1a1a2e;
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.28s, transform 0.28s;
  max-width: 86vw; text-align: center;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.ok  { border-left-color:#16a34a; }
#toast.err { border-left-color:#dc2626; }

/* ══════════════════════════════
   END OVERLAY
══════════════════════════════ */
#overlay {
  position: fixed; inset: 0;
  background: rgba(76,29,149,0.45); backdrop-filter: blur(6px);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#overlay.show { opacity:1; pointer-events:all; }
.end-card {
  background: #fff; border: 3px solid #c4b5fd; border-bottom: none;
  border-radius: 28px 28px 0 0; padding: 24px 32px 36px;
  text-align: center; width: 100%; max-width: 480px;
  box-shadow: 0 -12px 50px rgba(109,40,217,0.2);
  animation: slideUp 0.5s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
#end-char {
  position: absolute; top: -90px; left: 50%; transform: translateX(-50%);
}
/* white circle bg behind char so it sits cleanly */
#end-char::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90px; height: 90px;
  background: white;
  border-radius: 50%;
  border: 3px solid #e9d5ff;
  z-index: 0;
}
#end-char img { position: relative; z-index: 1; filter: none; display: block; }

#end-speech {
  background: #f3f0ff; border: 2.5px solid #c4b5fd; border-radius: 16px;
  padding: 12px 20px; margin: 52px auto 14px;
  font-family: 'Fredoka One', cursive; font-size: 0.95rem; color: #4c1d95;
  max-width: 320px; line-height: 1.5; position: relative;
}
#end-speech::after  { content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); border:10px solid transparent; border-bottom-color:#c4b5fd; }
#end-speech::before { content:''; position:absolute; bottom:calc(100% - 3px); left:50%; transform:translateX(-50%); border:10px solid transparent; border-bottom-color:#f3f0ff; z-index:1; }

.end-score { font-family:'Fredoka One',cursive; font-size:2rem; color:#7c3aed; margin-bottom:4px; }
.end-sub   { font-size:0.85rem; color:#6b7280; font-weight:700; margin-bottom:18px; }
.btn-play {
  background: linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; border:none;
  border-radius:50px; padding:12px 36px;
  font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer;
  box-shadow: 0 4px 18px rgba(124,58,237,0.4); transition: transform 0.15s;
}
.btn-play:hover { transform:translateY(-2px); }

/* ══════════════════════════════
   ANIMATIONS
══════════════════════════════ */
@keyframes sunPulse { 0%,100%{box-shadow:0 0 24px 8px rgba(253,224,71,0.3);}50%{box-shadow:0 0 36px 14px rgba(253,224,71,0.45);} }
@keyframes charBounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
@keyframes charJoy { 0%,100%{transform:translateY(0) scale(1);}30%{transform:translateY(-20px) scale(1.1) rotate(-4deg);}60%{transform:translateY(-10px) scale(1.08) rotate(4deg);} }
@keyframes charShiver { 0%,100%{transform:rotate(0);}20%{transform:translateX(-6px) rotate(-5deg);}40%{transform:translateX(6px) rotate(5deg);}60%{transform:translateX(-4px) rotate(-3deg);}80%{transform:translateX(4px) rotate(3deg);} }
@keyframes cloudPop { 0%{transform:scale(1);opacity:1;}50%{transform:scale(1.2);opacity:0.5;}100%{transform:scale(0);opacity:0;} }
@keyframes cloudShake { 0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-7px);}80%{transform:translateX(7px);} }
@keyframes floatheart { 0%{transform:translate(-50%,0) scale(0.6);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),-70px) scale(1.2);opacity:0;} }
@keyframes btnPulse { 0%,100%{box-shadow:0 4px 14px rgba(109,40,217,0.18);}50%{box-shadow:0 6px 22px rgba(109,40,217,0.32);} }
@keyframes btnPop { 0%,100%{transform:scale(1);}50%{transform:scale(1.08);} }
@keyframes btnShake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);} }
@keyframes slideUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
@keyframes cloudIn { from{transform:scale(0.7) translateY(-20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;} }
</style>
</head>
<body>

<!-- ZONE 1: HUD -->
<div id="hud">
  <div class="hud-pill">☁️ <span id="roundNum">1</span>/<span id="roundTotal">7</span></div>

    <div id="cloud-svg-wrap"></div>

</div>

<div id="buttons-zone">

<script>
const CATEGORIES = [
  { id:'stressor',         label:'Stressor' },
  { id:'stress_response',  label:'Stress Response' },
  { id:'acute_stress',     label:'Acute Stress' },
  { id:'chronic_stress',   label:'Chronic Stress' },
  { id:'stress_diagnosis', label:'Stress Diagnosis' },
];

const ALL_SCENARIOS = [
  { text:'Manager emails asking for a full report by 9am tomorrow',  cat:'stressor',         hint:'The demand is the TRIGGER = stressor.' },
  { text:'A colleague takes credit for your work in front of the team', cat:'stressor',      hint:'This situation CAUSES stress = stressor.' },
  { text:'Asked to present to the board with only 30 min notice',    cat:'stressor',         hint:'The sudden demand is the trigger = stressor.' },
  { text:'Company announces redundancies in your department',        cat:'stressor',         hint:'Job threat is the stressor.' },
  { text:'Copied into a heated email chain between senior leaders',  cat:'stressor',         hint:'Uncomfortable situation = stressor.' },
  { text:'Heart races and hands shake before a performance review',  cat:'stress_response',  hint:'Physical symptoms in REACTION = stress response.' },
  { text:'Stomach drops when your boss calls you for a private chat', cat:'stress_response', hint:'Bodily reaction to a trigger = stress response.' },
  { text:'Cannot sleep the night before a major product launch',     cat:'stress_response',  hint:'Insomnia triggered by pressure = stress response.' },
  { text:'You snap at a colleague after back-to-back stressful meetings', cat:'stress_response', hint:'Emotional outburst caused by stress = stress response.' },
  { text:'Mind goes blank mid-presentation despite knowing the content', cat:'stress_response', hint:'Cognitive freeze under pressure = stress response.' },
  { text:'System crashes right as you begin presenting to a client', cat:'acute_stress',     hint:'Sudden short-lived crisis = acute stress.' },
  { text:'Accidentally sent a confidential email to the wrong person', cat:'acute_stress',   hint:'A one-off stressful incident = acute stress.' },
  { text:'Stuck in traffic and will miss a key job interview',       cat:'acute_stress',     hint:'Immediate intense pressure = acute stress.' },
  { text:'Laptop dies two minutes before an important deadline',     cat:'acute_stress',     hint:'Sudden crisis that passes = acute stress.' },
  { text:'Working 60-hour weeks for the past six months with no break', cat:'chronic_stress', hint:'Ongoing over a long period = chronic stress.' },
  { text:'Feeling constantly undervalued despite years of strong performance', cat:'chronic_stress', hint:'Persistent over months = chronic stress.' },
  { text:'Managing a toxic team dynamic for over a year',            cat:'chronic_stress',   hint:'Long-lasting workplace stress = chronic stress.' },
  { text:'Dreading work every morning for the past several months',  cat:'chronic_stress',   hint:'Persistent negative feeling over time = chronic stress.' },
  { text:'HR asks you to complete a workplace wellbeing assessment', cat:'stress_diagnosis', hint:'A formal wellbeing check = stress diagnosis.' },
  { text:'GP refers you for a stress and burnout evaluation',        cat:'stress_diagnosis', hint:'Clinical referral to assess stress = stress diagnosis.' },
  { text:'Occupational health team conducts a stress risk assessment on you', cat:'stress_diagnosis', hint:'Formal evaluation of stress levels = stress diagnosis.' },
];

function pick7() {
  const pool = shuffle([...ALL_SCENARIOS]);
  const chosen = []; const seen = new Set();
  for(const s of pool){ if(!seen.has(s.cat)){ chosen.push(s); seen.add(s.cat); } if(chosen.length===5) break; }
  for(const s of pool){ if(!chosen.includes(s)){ chosen.push(s); } if(chosen.length===7) break; }
  return shuffle(chosen);
}

let G = {};

// ── CLOUD (centred, scales to text) ───────────────────────────
function renderCloud(text) {
  const wrap = document.getElementById('cloud-svg-wrap');
  wrap.className = '';

  const len = text.length;
  const W = Math.min(window.innerWidth - 32, len > 70 ? 340 : len > 45 ? 290 : 250);
  const H = len > 70 ? 150 : len > 45 ? 130 : 115;
  const fsize = len > 70 ? 12 : 13;

  wrap.innerHTML = `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
         style="animation: cloudIn 0.5s cubic-bezier(.34,1.56,.64,1) both; display:block;">
      <!-- shadow -->
      <ellipse cx="${W/2}" cy="${H*0.96}" rx="${W*0.44}" ry="${H*0.05}" fill="rgba(180,160,230,0.18)"/>
      <!-- outer blobs with border -->
      <ellipse cx="${W*0.50}" cy="${H*0.73}" rx="${W*0.46}" ry="${H*0.25}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.28}" cy="${H*0.56}" rx="${W*0.22}" ry="${H*0.28}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.52}" cy="${H*0.43}" rx="${W*0.26}" ry="${H*0.30}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.76}" cy="${H*0.58}" rx="${W*0.19}" ry="${H*0.23}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <!-- fill white to erase inner strokes -->
      <ellipse cx="${W*0.50}" cy="${H*0.73}" rx="${W*0.45}" ry="${H*0.24}" fill="white"/>
      <ellipse cx="${W*0.28}" cy="${H*0.56}" rx="${W*0.21}" ry="${H*0.27}" fill="white"/>
      <ellipse cx="${W*0.52}" cy="${H*0.43}" rx="${W*0.25}" ry="${H*0.29}" fill="white"/>
      <ellipse cx="${W*0.76}" cy="${H*0.58}" rx="${W*0.18}" ry="${H*0.22}" fill="white"/>
      <!-- text -->
      <foreignObject x="${W*0.06}" y="${H*0.38}" width="${W*0.88}" height="${H*0.56}">
        <div xmlns="http://www.w3.org/1999/xhtml"
          style="font-family:'Fredoka One',cursive;font-size:${fsize}px;color:#2d1b69;
                 text-align:center;line-height:1.4;padding:2px 4px;
                 display:flex;align-items:center;justify-content:center;height:100%;width:100%;">
          ${text}
        </div>
      </foreignObject>
    </svg>`;
}

// ── START ─────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').classList.remove('show');
  G = {
    queue: pick7(), idx:0, lives:3, score:0, charSize:88,
    counts: Object.fromEntries(CATEGORIES.map(c=>[c.id,0])),
    busy: false,
  };
  document.getElementById('roundTotal').textContent = G.queue.length;
  buildButtons(); buildLives(); updateHUD();
  setLit(false); syncChar('bounce'); syncSize(); hideSpeech();
  showCloud();
}

function buildButtons() {
  const el = document.getElementById('buttons'); el.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const b = document.createElement('div');
    b.className = 'cat-btn'; b.dataset.cat = cat.id;
    b.innerHTML = `<div class="cat-btn-title">${cat.label}</div><div class="cat-btn-count" id="cnt-${cat.id}">0 ✓</div>`;
    b.addEventListener('click', () => answer(cat.id, b));
    el.appendChild(b);
  });
}

function setLit(yes) {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('lit', yes);
    b.style.pointerEvents = yes ? 'auto' : 'none';
  });
}

function buildLives() {
  const el = document.getElementById('lives'); el.innerHTML = '';
  for(let i=0;i<3;i++){ const s=document.createElement('span'); s.className='life'; s.id='life-'+i; s.textContent='💜'; el.appendChild(s); }
}
function updateLives() { for(let i=0;i<3;i++) document.getElementById('life-'+i)?.classList.toggle('lost',i>=G.lives); }
function updateHUD() { document.getElementById('roundNum').textContent=Math.min(G.idx+1,G.queue.length); document.getElementById('scoreNum').textContent=G.score; }

function showCloud() {
  if(G.idx>=G.queue.length){ endGame(); return; }
  setLit(false); updateHUD(); hideSpeech();
  renderCloud(G.queue[G.idx].text);
  setTimeout(()=>setLit(true), 520);
}

function answer(catId, btn) {
  if(G.busy) return;
  G.busy = true; setLit(false);
  const s = G.queue[G.idx], ok = catId === s.cat;
  const wrap = document.getElementById('cloud-svg-wrap');

  if(ok){
    G.score++; G.charSize = Math.max(88, G.charSize-8);
    G.counts[catId]++; document.getElementById('cnt-'+catId).textContent = G.counts[catId]+' ✓';
    btn.classList.add('flash-correct');
    wrap.classList.add('pop');
    spawnHearts(); syncChar('joy');
    showSpeech(WINS[Math.floor(Math.random()*WINS.length)]);
    toast('ok','❤️ Correct!');
    setTimeout(()=>btn.classList.remove('flash-correct'), 700);
    setTimeout(()=>{
      wrap.innerHTML=''; wrap.className='';
      G.busy=false; G.idx++;
      syncChar('bounce'); syncSize(); updateHUD(); showCloud();
    }, 480);
  } else {
    G.lives--; G.charSize = Math.min(180, G.charSize+22);
    updateLives(); btn.classList.add('flash-wrong');
    wrap.classList.add('shake');
    syncChar('shiver'); showSpeech('Hmm, try again! 🤔');
    toast('err','💡 '+s.hint);
    setTimeout(()=>{
      btn.classList.remove('flash-wrong'); wrap.classList.remove('shake');
      syncChar('bounce'); syncSize(); G.busy=false;
      if(G.lives<=0) setTimeout(()=>endGame(),300);
      else setLit(true);
    }, 700);
  }
}

function syncChar(mode) {
  const a = document.getElementById('char-area');
  a.style.animation='none'; void a.offsetHeight;
  if(mode==='joy')       a.style.animation='charJoy 0.6s ease, charBounce 1.6s ease-in-out 0.6s infinite';
  else if(mode==='shiver') a.style.animation='charShiver 0.55s ease, charBounce 1.6s ease-in-out 0.55s infinite';
  else                   a.style.animation='charBounce 1.6s ease-in-out infinite';
}
function syncSize() { const img=document.getElementById('char-img'); img.style.width=G.charSize+'px'; img.style.height=Math.round(G.charSize*1.1)+'px'; }

let sT;
function showSpeech(msg){ clearTimeout(sT); const el=document.getElementById('speech'); el.textContent=msg; el.classList.add('show'); sT=setTimeout(()=>el.classList.remove('show'),1800); }
function hideSpeech(){ document.getElementById('speech').classList.remove('show'); }

function spawnHearts(){
  const a=document.getElementById('hearts-area');
  ['❤️','💜','💖','✨','💗'].forEach((h,i)=>{
    setTimeout(()=>{ const el=document.createElement('span'); el.className='fheart'; el.style.setProperty('--dx',((Math.random()-0.5)*80)+'px'); el.textContent=h; a.appendChild(el); setTimeout(()=>el.remove(),1400); },i*100);
  });
}

let tT;
function toast(type,msg){ clearTimeout(tT); const el=document.getElementById('toast'); el.textContent=msg; el.className='show '+type; tT=setTimeout(()=>el.className='',type==='ok'?1600:2800); }

function endGame(){
  const total=G.queue.length, score=G.score;
  const endImg=document.getElementById('end-char-img');
  endImg.style.width=G.charSize+'px'; endImg.style.height=Math.round(G.charSize*1.1)+'px';
  let speech, sub;
  if(score>=6){       speech="Good Job! You really know your stuff! 🌟"; sub="Excellent score!"; }
  else if(score===5){ speech="Good Job! Almost perfect! 💪";             sub="Great effort!"; }
  else if(score===4){ speech="Not bad! A bit more practice and you'll nail it! 😊"; sub="Keep it up!"; }
  else {              speech="Go read the flip cards again — you'll get there! 📖"; sub="Review the material and try again."; }
  document.getElementById('end-speech').textContent=speech;
  document.getElementById('endScore').textContent=score+' / '+total;
  document.getElementById('endSub').textContent=sub;
  document.getElementById('overlay').classList.add('show');
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
const WINS=['Great sort! ❤️','Nailed it! ✨','Spot on! 💜','You got it! 🌟','Perfect! 💖'];

window.addEventListener('load', startGame);
</script>
</body>
