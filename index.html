<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #fff;
  height: 100vh; width: 100vw;
  overflow: hidden;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* HUD */
#hud {
  background: #fff;
  border-bottom: 2px solid #e9d5ff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 14px;
  flex-shrink: 0;
}
.hud-pill {
  background: #f3f0ff; border: 2px solid #c4b5fd;
  border-radius: 50px; padding: 2px 10px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.75rem; color: #7c3aed;
}
#lives { display: flex; gap: 4px; align-items: center; }
.life { font-size: 0.9rem; transition: opacity 0.3s, transform 0.3s; }
.life.lost { opacity: 0.18; transform: scale(0.75); }

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* CLOUD ZONE */
#cloud-zone {
  background: #dbeafe;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 16px 4px;
  flex-shrink: 0;
  position: relative;
}
#instruction {
  font-family: 'Fredoka One', cursive;
  font-size: 0.68rem; color: #6d28d9;
  margin-bottom: 4px; letter-spacing: 0.5px;
}
#sun {
  position: absolute; right: 12px; top: 4px;
  font-size: 2.2rem; line-height: 1;
  pointer-events: none;
}
#cloud-svg-wrap { position: relative; }
#cloud-svg-wrap.pop   { animation: cloudPop 0.45s ease forwards; }
#cloud-svg-wrap.shake { animation: cloudShake 0.5s ease; }

/* BUTTONS — ONE ROW PILLS */
#buttons-zone {
  background: #fff;
  border-top: 2px solid #e9d5ff;
  padding: 6px 10px;
  flex-shrink: 0;
}
#buttons {
  display: flex;
  flex-direction: row;
  gap: 5px;
  justify-content: center;
  align-items: center;
  flex-wrap: nowrap;
}
.cat-btn {
  background: #fff; border: 2px solid #c4b5fd;
  border-radius: 50px; padding: 4px 6px;
  text-align: center; cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 2px 6px rgba(109,40,217,0.07);
  opacity: 0.4; pointer-events: none;
  flex: 1; min-width: 0; max-width: 130px;
}
.cat-btn.lit {
  opacity: 1; border-color: #7c3aed; background: #faf5ff;
  box-shadow: 0 3px 12px rgba(109,40,217,0.2);
  pointer-events: auto;
  animation: btnPulse 1.4s ease-in-out infinite;
}
.cat-btn.lit:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 5px 16px rgba(109,40,217,0.3);
  animation: none;
}
.cat-btn.flash-correct { border-color:#16a34a !important; background:#f0fdf4 !important; animation:btnPop 0.5s ease !important; opacity:1; }
.cat-btn.flash-wrong   { border-color:#dc2626 !important; background:#fff1f2 !important; animation:btnShake 0.45s ease !important; opacity:1; }
.cat-btn-title { font-family:'Fredoka One',cursive; font-size:0.58rem; color:#4c1d95; line-height:1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-btn-count { font-size:0.55rem; color:#a78bfa; font-weight:800; margin-top:1px; }

/* CHARACTER ZONE */
#char-zone {
  background: #fff;
  flex: 1;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  justify-content: center;
  padding: 0px 16px;
  margin-top: 6px;
  min-height: 0;
  overflow: visible;
  gap: 14px;
}
#char-area {
  display: flex; flex-direction: column; align-items: center;
  animation: charBounce 1.6s ease-in-out infinite;
  position: relative;
  flex-shrink: 0;
}
#char-img {
  display: block; filter: none;
  transition: width 0.55s cubic-bezier(.34,1.56,.64,1),
              height 0.55s cubic-bezier(.34,1.56,.64,1);
}
#hearts-area {
  position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  pointer-events: none; z-index: 5;
}
.fheart {
  position: absolute; font-size: 1.1rem; left: 50%; top: 0;
  animation: floatheart 1.3s ease-out forwards;
}
#speech {
  background: white; border: 2.5px solid #c4b5fd;
  border-radius: 14px; padding: 8px 12px;
  font-family: 'Fredoka One', cursive; font-size: 0.7rem; color: #4c1d95;
  white-space: normal; max-width: 180px; text-align: center; line-height: 1.4;
  box-shadow: 0 4px 14px rgba(109,40,217,0.15);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  flex-shrink: 0; position: relative;
}
#speech::before {
  content: '';
  position: absolute;
  left: -10px; top: 50%; transform: translateY(-50%);
  border: 8px solid transparent;
  border-right-color: #c4b5fd;
}
#speech::after {
  content: '';
  position: absolute;
  left: -6px; top: 50%; transform: translateY(-50%);
  border: 6px solid transparent;
  border-right-color: white;
}
#speech.show { opacity: 1; }

/* TOAST */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #fff; border-radius: 12px; padding: 7px 16px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.11);
  border: 2px solid #e5e7eb; border-left: 5px solid #7c3aed;
  font-size: 0.78rem; font-weight: 800; color: #1a1a2e;
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity 0.28s, transform 0.28s;
  max-width: 86vw; text-align: center;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.ok  { border-left-color:#16a34a; }
#toast.err { border-left-color:#dc2626; }

/* END OVERLAY */
#overlay {
  position: fixed; inset: 0;
  background: rgba(76,29,149,0.45); backdrop-filter: blur(6px);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
#overlay.show { opacity:1; pointer-events:all; }
.end-card {
  background: #fff; border: 3px solid #c4b5fd; border-bottom: none;
  border-radius: 28px 28px 0 0; padding: 60px 28px 28px;
  text-align: center; width: 100%; max-width: 480px;
  box-shadow: 0 -12px 50px rgba(109,40,217,0.2);
  animation: slideUp 0.5s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
#end-char {
  position: absolute; top: -55px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 90px;
  background: white; border-radius: 50%;
  border: 3px solid #c4b5fd;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(109,40,217,0.15);
}
#end-char img { position: relative; z-index: 1; filter: none; display: block; }
#end-speech {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem; color: #4c1d95; margin-bottom: 8px;
}
.end-score {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem; color: #7c3aed; line-height: 1;
}
.end-sub { font-size: 0.8rem; color: #6b7280; margin: 4px 0 16px; font-weight: 700; }
.btn-play {
  background: #7c3aed; color: #fff; border: none;
  border-radius: 50px; padding: 10px 28px;
  font-family: 'Fredoka One', cursive; font-size: 1rem;
  cursor: pointer; box-shadow: 0 4px 14px rgba(109,40,217,0.35);
  transition: transform 0.18s;
}
.btn-play:hover { transform: translateY(-3px); }

/* ANIMATIONS */
@keyframes charBounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);} }
@keyframes charJoy { 0%{transform:scale(1) rotate(0);}25%{transform:scale(1.2) rotate(-8deg);}50%{transform:scale(1.2) rotate(8deg);}75%{transform:scale(1.1) translateY(-12px);}100%{transform:scale(1) rotate(0);} }
@keyframes charShiver { 0%,100%{transform:rotate(0);}20%{transform:translateX(-5px) rotate(-5deg);}40%{transform:translateX(5px) rotate(5deg);}60%{transform:translateX(-4px) rotate(-3deg);}80%{transform:translateX(4px) rotate(3deg);} }
@keyframes charDance { 0%{transform:translateY(0) rotate(0);}25%{transform:translateY(-10px) rotate(-10deg);}50%{transform:translateY(0) rotate(10deg);}75%{transform:translateY(-6px) rotate(-6deg);}100%{transform:translateY(0) rotate(0);} }
@keyframes charSpin { 0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.2);}100%{transform:rotate(360deg) scale(1);} }
@keyframes floatheart { 0%{transform:translateX(-50%) translateY(0);opacity:1;} 100%{transform:translateX(calc(-50% + var(--dx, 0px))) translateY(-60px);opacity:0;} }
@keyframes cloudPop { 0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(0) translateY(-30px);opacity:0;} }
@keyframes cloudShake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);} }
@keyframes btnPop { 0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);} }
@keyframes btnShake { 0%,100%{transform:translateX(0);}33%{transform:translateX(-5px);}66%{transform:translateX(5px);} }
@keyframes btnPulse { 0%,100%{box-shadow:0 3px 10px rgba(109,40,217,0.2);}50%{box-shadow:0 5px 20px rgba(109,40,217,0.4);} }
@keyframes slideUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
@keyframes cloudIn { from{transform:scale(0.7) translateY(-20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;} }
</style>
</head>

<script>
const CATEGORIES = [
  { id:'stressor',         label:'Stressor' },
  { id:'stress_response',  label:'Stress Response' },
  { id:'acute_stress',     label:'Acute Stress' },
  { id:'chronic_stress',   label:'Chronic Stress' },
  { id:'stress_diagnosis', label:'Stress Diagnosis' },
];

const FUN_FACTS = {
  stressor: [
    '💡 Even a promotion can be a stressor — any demand on your body counts!',
    '🧠 Your brain cannot tell a real threat from an imagined one!',
    '⚡ A stressor only becomes harmful when your brain decides it is bigger than your ability to cope.',
  ],
  stress_response: [
    '⚡ Your body reacts to stress in under 2 seconds — faster than conscious thought!',
    '❤️ Your heart can beat up to 180 times per minute during a stress response!',
    '🦁 The stress response evolved to survive predators — not emails!',
  ],
  acute_stress: [
    '✅ After acute stress passes your body can fully recover — unlike chronic stress.',
    '🏆 Athletes use acute stress to perform better — it is called being in the zone!',
    '🎯 Acute stress actually sharpens your focus and boosts performance temporarily!',
  ],
  chronic_stress: [
    '🧠 Long term chronic stress can physically shrink the part of your brain used for memory.',
    '⚠️ Chronic stress is linked to 6 of the leading causes of death worldwide.',
    '🛑 Your body was not designed to stay in stress mode for months — it needs recovery.',
  ],
  stress_diagnosis: [
    '🌟 Recognising stress early is the single most powerful thing you can do about it.',
    '⏰ Most people wait 2 years before seeking help — early action changes everything.',
    '💪 Stress diagnosis is not a weakness — it is self awareness in action.',
    '💜 The earlier stress is identified the faster a person can recover.',
  ],
};

const ALL_SCENARIOS = [
  { text:'Asked to present to the board with only 30 min notice',                                              cat:'stressor',         hint:'The sudden demand is the trigger = stressor.' },
  { text:'Company announces redundancies in your department',                                                  cat:'stressor',         hint:'Job threat is the stressor.' },
  { text:'A key team member resigns during your busiest period',                                               cat:'stressor',         hint:'An unexpected loss creating more pressure = stressor.' },
  { text:'Heart races and hands shake before a performance review',                                            cat:'stress_response',  hint:'Physical symptoms in reaction = stress response.' },
  { text:'Cannot sleep the night before a major product launch',                                               cat:'stress_response',  hint:'Insomnia triggered by pressure = stress response.' },
  { text:'Mind goes blank mid-presentation despite knowing the content',                                       cat:'stress_response',  hint:'Cognitive freeze under pressure = stress response.' },
  { text:'System crashes right as you begin presenting to a client',                                           cat:'acute_stress',     hint:'Sudden short-lived crisis = acute stress.' },
  { text:'Accidentally sent a confidential email to the wrong person',                                         cat:'acute_stress',     hint:'A one-off stressful incident = acute stress.' },
  { text:'Stuck in traffic and will miss a key job interview',                                                  cat:'acute_stress',     hint:'Immediate intense pressure = acute stress.' },
  { text:'Laptop dies two minutes before an important deadline',                                                cat:'acute_stress',     hint:'Sudden crisis that passes = acute stress.' },
  { text:'Feeling constantly undervalued despite years of strong performance',                                  cat:'chronic_stress',   hint:'Persistent over months = chronic stress.' },
  { text:'Managing a toxic team dynamic for over a year',                                                       cat:'chronic_stress',   hint:'Long-lasting workplace stress = chronic stress.' },
  { text:'Dreading work every morning for the past several months',                                             cat:'chronic_stress',   hint:'Persistent negative feeling over time = chronic stress.' },
  { text:'You have felt disconnected and unmotivated at work for several months',                               cat:'chronic_stress',   hint:'Ongoing low engagement over time = chronic stress.' },
  { text:'You have been feeling exhausted and on edge for months and your doctor suggests it could be stress related', cat:'stress_diagnosis', hint:'A medical observation about prolonged stress = stress diagnosis.' },
  { text:'You have been getting frequent headaches and your doctor thinks chronic stress could be the cause',   cat:'stress_diagnosis',  hint:'Physical symptoms prompting a clinical assessment = stress diagnosis.' },
];

function pick7() {
  const pool = shuffle([...ALL_SCENARIOS]);
  const chosen = []; const seen = new Set();
  for(const s of pool){ if(!seen.has(s.cat)){ chosen.push(s); seen.add(s.cat); } if(chosen.length===5) break; }
  for(const s of pool){ if(!chosen.includes(s)){ chosen.push(s); } if(chosen.length===7) break; }
  return shuffle(chosen);
}

let G = {};

function renderCloud(text) {
  const wrap = document.getElementById('cloud-svg-wrap');
  wrap.className = '';
  const len = text.length;
  const availW = document.getElementById('cloud-zone').offsetWidth || 400;
  const W = Math.min(availW - 60, len > 70 ? 300 : len > 45 ? 260 : 220);
  const H = len > 70 ? 110 : len > 45 ? 96 : 84;
  const fsize = len > 70 ? 10 : 11;
  wrap.innerHTML = `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
         style="animation: cloudIn 0.5s cubic-bezier(.34,1.56,.64,1) both; display:block;">
      <ellipse cx="${W/2}" cy="${H*0.96}" rx="${W*0.44}" ry="${H*0.05}" fill="rgba(180,160,230,0.18)"/>
      <ellipse cx="${W*0.50}" cy="${H*0.73}" rx="${W*0.46}" ry="${H*0.25}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.28}" cy="${H*0.56}" rx="${W*0.22}" ry="${H*0.28}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.52}" cy="${H*0.43}" rx="${W*0.26}" ry="${H*0.30}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.76}" cy="${H*0.58}" rx="${W*0.19}" ry="${H*0.23}" fill="white" stroke="#c4b5fd" stroke-width="2.5"/>
      <ellipse cx="${W*0.50}" cy="${H*0.73}" rx="${W*0.45}" ry="${H*0.24}" fill="white"/>
      <ellipse cx="${W*0.28}" cy="${H*0.56}" rx="${W*0.21}" ry="${H*0.27}" fill="white"/>
      <ellipse cx="${W*0.52}" cy="${H*0.43}" rx="${W*0.25}" ry="${H*0.29}" fill="white"/>
      <ellipse cx="${W*0.76}" cy="${H*0.58}" rx="${W*0.18}" ry="${H*0.22}" fill="white"/>
      <foreignObject x="${W*0.06}" y="${H*0.38}" width="${W*0.88}" height="${H*0.56}">
        <div xmlns="http://www.w3.org/1999/xhtml"
          style="font-family:'Fredoka One',cursive;font-size:${fsize}px;color:#2d1b69;
                 text-align:center;line-height:1.4;padding:2px 4px;
                 display:flex;align-items:center;justify-content:center;height:100%;width:100%;">
          ${text}
        </div>
      </foreignObject>
    </svg>`;
}

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  G = {
    queue: pick7(), idx:0, lives:3, score:0, charSize:105,
    counts: Object.fromEntries(CATEGORIES.map(c=>[c.id,0])),
    busy: false,
  };
  document.getElementById('roundTotal').textContent = G.queue.length;
  buildButtons(); buildLives(); updateHUD();
  setLit(false); syncChar('bounce'); syncSize(); hideSpeech();
  showCloud();
}

function buildButtons() {
  const el = document.getElementById('buttons'); el.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const b = document.createElement('div');
    b.className = 'cat-btn'; b.dataset.cat = cat.id;
    b.innerHTML = `<div class="cat-btn-title">${cat.label}</div><div class="cat-btn-count" id="cnt-${cat.id}">0 ✓</div>`;
    b.addEventListener('click', () => answer(cat.id, b));
    el.appendChild(b);
  });
}

function setLit(yes) {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('lit', yes);
    b.style.pointerEvents = yes ? 'auto' : 'none';
  });
}

function buildLives() {
  const el = document.getElementById('lives'); el.innerHTML = '';
  for(let i=0;i<3;i++){ const s=document.createElement('span'); s.className='life'; s.id='life-'+i; s.textContent='💜'; el.appendChild(s); }
}
function updateLives() { for(let i=0;i<3;i++) document.getElementById('life-'+i)?.classList.toggle('lost',i>=G.lives); }
function updateHUD() { document.getElementById('roundNum').textContent=Math.min(G.idx+1,G.queue.length); document.getElementById('scoreNum').textContent=G.score; }

function showCloud() {
  if(G.idx>=G.queue.length){ endGame(); return; }
  setLit(false); updateHUD(); hideSpeech();
  renderCloud(G.queue[G.idx].text);
  setTimeout(()=>setLit(true), 520);
}

function answer(catId, btn) {
  if(G.busy) return;
  G.busy = true; setLit(false);
  const s = G.queue[G.idx], ok = catId === s.cat;
  const wrap = document.getElementById('cloud-svg-wrap');
  if(ok){
    G.score++; G.charSize = Math.max(68, G.charSize-5);
    G.counts[catId]++; document.getElementById('cnt-'+catId).textContent = G.counts[catId]+' ✓';
    btn.classList.add('flash-correct');
    wrap.classList.add('pop');
    spawnHearts();
    // Stand still and show fun fact
    const ca = document.getElementById('char-area');
    ca.style.animation = 'none';
    const facts = FUN_FACTS[catId] || [];
    const fact = facts[Math.floor(Math.random()*facts.length)];
    showSpeech(fact);
    toast('ok','❤️ Correct!');
    setTimeout(()=>btn.classList.remove('flash-correct'), 700);
    setTimeout(()=>{ wrap.innerHTML=''; wrap.className=''; G.busy=false; G.idx++; syncChar('bounce'); syncSize(); updateHUD(); showCloud(); }, 3000);
  } else {
    G.lives--;
    updateLives(); btn.classList.add('flash-wrong');
    wrap.classList.add('shake');
    syncChar('shiver'); showSpeech('💡 '+s.hint);
    toast('err','❌ Wrong!');
    setTimeout(()=>{ btn.classList.remove('flash-wrong'); wrap.classList.remove('shake'); syncChar('bounce'); syncSize(); G.busy=false; if(G.lives<=0) setTimeout(()=>endGame(),300); else setLit(true); }, 700);
  }
}

function syncChar(mode) {
  const a = document.getElementById('char-area');
  a.style.animation='none'; void a.offsetHeight;
  const joyAnims=['charJoy 0.6s ease','charDance 0.8s ease','charSpin 0.7s ease'];
  const joyPick=joyAnims[Math.floor(Math.random()*joyAnims.length)];
  if(mode==='joy')       a.style.animation=joyPick+', charBounce 1.6s ease-in-out 0.8s infinite';
  else if(mode==='shiver') a.style.animation='charShiver 0.55s ease, charBounce 1.6s ease-in-out 0.55s infinite';
  else                   a.style.animation='charBounce 1.6s ease-in-out infinite';
}
function syncSize() { const img=document.getElementById('char-img'); img.style.width=G.charSize+'px'; img.style.height=Math.round(G.charSize*1.1)+'px'; }

let sT;
function showSpeech(msg){ clearTimeout(sT); const el=document.getElementById('speech'); el.textContent=msg; el.classList.add('show'); sT=setTimeout(()=>el.classList.remove('show'),3000); }
function hideSpeech(){ document.getElementById('speech').classList.remove('show'); }

function spawnHearts(){
  const a=document.getElementById('hearts-area');
  ['❤️','💜','💖','✨','💗'].forEach((h,i)=>{
    setTimeout(()=>{ const el=document.createElement('span'); el.className='fheart'; el.style.setProperty('--dx',((Math.random()-0.5)*80)+'px'); el.textContent=h; a.appendChild(el); setTimeout(()=>el.remove(),1400); },i*100);
  });
}

let tT;
function toast(type,msg){ clearTimeout(tT); const el=document.getElementById('toast'); el.textContent=msg; el.className='show '+type; tT=setTimeout(()=>el.className='',type==='ok'?1600:2800); }

function endGame(){
  const total=G.queue.length, score=G.score;
  const endImg=document.getElementById('end-char-img');
  endImg.style.width='52px'; endImg.style.height='57px';
  let speech, sub;
  if(score>=6){       speech="You really know your stuff! 🌟"; sub="Excellent score!"; }
  else if(score===5){ speech="Almost perfect! 💪";             sub="Great effort!"; }
  else if(score===4){ speech="Not bad! A bit more practice! 😊"; sub="Keep it up!"; }
  else {              speech="Go read the flip cards again! 📖"; sub="Review the material and try again."; }
  document.getElementById('end-speech').textContent=speech;
  document.getElementById('endScore').textContent=score+' / '+total;
  document.getElementById('endSub').textContent=sub;
  document.getElementById('overlay').classList.add('show');
}
